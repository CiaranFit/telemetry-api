<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensor Dashboard</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body>

  <header>
    <div class="logo"><span>◈</span>TELEMETRY / SENSOR DASHBOARD</div>
    <div id="status-bar">
      <div id="status-dot" class="init"></div>
      <span id="status-text">CONNECTING</span>
      <span id="last-seen"></span>
    </div>
  </header>

  <div id="config-bar">
    <label for="device-select">DEVICE ▸</label>
    <select id="device-select"></select>

    <div class="window-toggle">
      <span class="toggle-label">WINDOW ▸</span>
      <button class="window-btn active" data-hours="4">4H</button>
      <button class="window-btn" data-hours="8">8H</button>
      <button class="window-btn" data-hours="24">24H</button>
    </div>
  </div>

  <div class="grid row-3" style="margin-bottom:16px;">
    <div class="tile tile-temp">
      <div class="tile-label">Temperature</div>
      <div class="tile-value" id="val-temp">--<span class="tile-unit">°C</span></div>
      <div class="tile-sub">
        <span class="badge" id="sub-temp">waiting for data</span>
      </div>
    </div>

    <div class="tile tile-humid">
      <div class="tile-label">Humidity</div>
      <div class="tile-value" id="val-humid">--<span class="tile-unit">%</span></div>
      <div class="tile-sub">
        <span class="badge" id="sub-humid">waiting for data</span>
      </div>
    </div>

    <div class="tile tile-weather">
      <div class="tile-label">Weather Today</div>
      <div class="tile-value" id="val-weather">--<span class="tile-unit">°C</span></div>
      <div class="tile-sub">
        <span class="badge" id="sub-weather">forecast unavailable</span>
      </div>
    </div>
  </div>

  <div class="grid row-1" style="margin-bottom:16px;">
    <div class="tile tile-chart-t">
      <div class="chart-header">
        <span class="chart-title" id="chart-t-title">Temperature / 4hr window</span>
        <span class="chart-meta" id="chart-t-meta">building history…</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-temp"></canvas>
        <div class="no-data" id="nd-temp">ACCUMULATING DATA…</div>
      </div>
    </div>
  </div>

  <div class="grid row-1">
    <div class="tile tile-chart-h">
      <div class="chart-header">
        <span class="chart-title" id="chart-h-title">Humidity / 4hr window</span>
        <span class="chart-meta" id="chart-h-meta">building history…</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-humid"></canvas>
        <div class="no-data" id="nd-humid">ACCUMULATING DATA…</div>
      </div>
    </div>
  </div>

  <script src="/dashboard/app.js"></script>
</body>
</html>
